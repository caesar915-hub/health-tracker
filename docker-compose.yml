services:
  db:
    image: postgres:15-alpine
    # ... (same as before) ...

  backend:
    build: .
    # REMOVE the ports: - "8080:8080" section! 
    # We want the backend to be "private" inside the Docker network.
    environment:
      DB_URL: "postgres://user_admin:secret_password@db:5432/health_tracker_db?sslmode=disable"
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: health_proxy
    volumes:
      - ./frontend:/usr/share/nginx/html:ro # Mount your HTML here
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro # Mount config
    ports:
      - "80:80" # Standard web port
    depends_on:
      - backend