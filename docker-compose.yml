services:
  db:
    image: postgres:15-alpine
    container_name: health_db
    environment:
      - POSTGRES_USER=user_admin
      - POSTGRES_PASSWORD=secret_password
      - POSTGRES_DB=health_tracker_db
    ports:
      - "5432:5432"
    volumes:
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_admin -d health_tracker_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: health_backend
    environment:
      - DB_URL=postgres://user_admin:secret_password@db:5432/health_tracker_db?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: health_proxy
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend