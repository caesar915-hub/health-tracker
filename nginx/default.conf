server {
    listen 80;

    # 1. Serve the Frontend (Static Files)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy the API requests to the Go Backend
    location /logs {
        proxy_pass http://backend:8080/logs;
    }

    location /submit {
        proxy_pass http://backend:8080/submit;
    }
}